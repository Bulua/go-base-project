services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_PORT: "8080"
      REDIS_ADDR: "${REDIS_HOST:-120.53.251.75}:${REDIS_PORT_IN_CONTAINER:-16379}"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "/app/gobaseproject", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles:
      - local-cache
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-change-me}"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change-me}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    profiles:
      - local-db
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-change-me}"
      MYSQL_DATABASE: "${DB_NAME:-go_base_project}"
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-13307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  redis_data:
  mysql_data:
