app:
  name: GoBaseProject
  env: development
  port: 8080

database:
  host: localhost
  port: 3306
  name: go_base_project
  user: root
  password: change-me
  charset: utf8mb4

redis:
  host: localhost
  port: 6379
  password: change-me
  db: 0

jwt:
  secret: change-me-in-production
  access_token_ttl_minutes: 120
  refresh_token_ttl_minutes: 10080

codegen:
  # Path to web/src relative to server working directory.
  # Set to empty string to disable auto file generation (e.g. in Docker).
  web_src_root: ../web/src

upload:
  dir: ./uploads
  max_size_mb: 10
